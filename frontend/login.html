<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Career Guidance</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <i class="fas fa-robot"></i>
                <h1><a href="index.html" style="color: white; text-decoration: none;">AI Career Guidance</a></h1>
            </div>
        </div>
    </header>

    <main class="container" style="display: flex; justify-content: center; margin-top: 50px;">
        <div class="form-card fade-in" style="width: 100%; max-width: 400px;">
            <div class="section-header" style="justify-content: center;">
                <h2>Login</h2>
            </div>

            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" required>
            </div>

            <button class="btn-primary" onclick="loginUser()" style="width: 100%;">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>

            <p style="text-align: center; margin-top: 20px;">
                Don't have an account? <a href="register.html">Register here</a>
            </p>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        // Check if already logged in
        if (checkLoginState()) {
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
